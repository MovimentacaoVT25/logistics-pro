<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | Logistics Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                },
            },
        }
    </script>
</head>
<body class="font-sans antialiased">

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[9998] hidden items-center justify-center">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-primary-200 border-t-primary-600 rounded-full animate-spin"></div>
            <p class="text-sm font-medium text-slate-400 animate-pulse">Processando...</p>
        </div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            
            <h1 class="text-2xl font-bold text-white text-center mb-2">Bem-vindo</h1>
            <p class="text-slate-400 text-center mb-8">Acesse sua conta no Logistics Pro</p>
            
            <!-- Error Message -->
            <div id="errorMessage" class="error-message hidden mb-6"></div>
            
            <!-- Login Form -->
            <form id="loginForm" class="space-y-5">
                <div class="relative">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                    </svg>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com" 
                        class="login-input">
                </div>
                
                <div class="relative">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    <input type="password" id="password" name="password" required placeholder="Sua senha" 
                        class="login-input">
                </div>
                
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-400 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-600 bg-slate-700 text-primary-600 focus:ring-primary-500">
                        <span>Lembrar-me</span>
                    </label>
                    <a href="#" onclick="showResetPassword()" class="text-primary-400 hover:text-primary-300 transition-colors">
                        Esqueceu a senha?
                    </a>
                </div>
                
                <button type="submit" class="login-btn">
                    Entrar
                </button>
            </form>
            
            <!-- Divider -->
            <div class="divider my-6">
                <span>ou</span>
            </div>
            
            <!-- Social Login -->
            <button onclick="loginWithGoogle()" class="social-btn">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Entrar com Google</span>
            </button>
            
            <!-- Register Link -->
            <p class="text-center text-slate-400 text-sm mt-6">
                Não tem uma conta? 
                <a href="#" onclick="showRegister()" class="text-primary-400 hover:text-primary-300 transition-colors font-medium">
                    Cadastre-se
                </a>
            </p>
            
            <!-- Back Link -->
            <a href="/index.html" class="flex items-center justify-center gap-2 text-slate-400 hover:text-white transition-colors mt-6 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                <span>Voltar para o início</span>
            </a>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetModal" class="fixed inset-0 z-[100] hidden opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeResetModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-slate-800 rounded-2xl p-8 w-full max-w-md border border-slate-700">
                <h3 class="text-xl font-bold text-white mb-2">Recuperar Senha</h3>
                <p class="text-slate-400 text-sm mb-6">Digite seu email para receber instruções de recuperação.</p>
                
                <form id="resetForm" class="space-y-4">
                    <input type="email" id="resetEmail" required placeholder="seu@email.com" 
                        class="w-full px-4 py-3 rounded-xl border border-slate-700 bg-slate-900 text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    
                    <div class="flex gap-3">
                        <button type="button" onclick="closeResetModal()" class="flex-1 px-4 py-3 rounded-xl border border-slate-600 text-slate-300 hover:bg-slate-700 transition-colors">
                            Cancelar
                        </button>
                        <button type="submit" class="flex-1 px-4 py-3 rounded-xl bg-primary-600 hover:bg-primary-700 text-white font-medium transition-colors">
                            Enviar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="fixed inset-0 z-[100] hidden opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeRegisterModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-slate-800 rounded-2xl p-8 w-full max-w-md border border-slate-700 max-h-[90vh] overflow-y-auto">
                <h3 class="text-xl font-bold text-white mb-2">Criar Conta</h3>
                <p class="text-slate-400 text-sm mb-6">Preencha os dados abaixo para se cadastrar.</p>
                
                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Nome Completo</label>
                        <input type="text" id="registerName" required placeholder="Seu nome" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-700 bg-slate-900 text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Email</label>
                        <input type="email" id="registerEmail" required placeholder="seu@email.com" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-700 bg-slate-900 text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Senha</label>
                        <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres" minlength="6"
                            class="w-full px-4 py-3 rounded-xl border border-slate-700 bg-slate-900 text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    </div>
                    
                    <div class="flex gap-3 pt-2">
                        <button type="button" onclick="closeRegisterModal()" class="flex-1 px-4 py-3 rounded-xl border border-slate-600 text-slate-300 hover:bg-slate-700 transition-colors">
                            Cancelar
                        </button>
                        <button type="submit" class="flex-1 px-4 py-3 rounded-xl bg-primary-600 hover:bg-primary-700 text-white font-medium transition-colors">
                            Cadastrar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            await loginWithEmail(email, password);
        });

        // Reset Password Form Handler
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const success = await resetPassword(email);
            if (success) {
                closeResetModal();
            }
        });

        // Register Form Handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            
            const result = await registerUser(email, password, { name });
            if (result) {
                closeRegisterModal();
            }
        });

        // Modal Functions
        function showResetPassword() {
            const modal = document.getElementById('resetModal');
            modal.classList.remove('hidden', 'pointer-events-none', 'opacity-0');
        }

        function closeResetModal() {
            const modal = document.getElementById('resetModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function showRegister() {
            const modal = document.getElementById('registerModal');
            modal.classList.remove('hidden', 'pointer-events-none', 'opacity-0');
        }

        function closeRegisterModal() {
            const modal = document.getElementById('registerModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }
    </script>
</body>
</html>
