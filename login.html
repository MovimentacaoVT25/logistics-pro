<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Fretes</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="url(#gradient)"/>
            <path d="M24 12L34 24L24 36L14 24L24 12Z" fill="white" opacity="0.9"/>
            <defs>
              <linearGradient id="gradient" x1="0" y1="0" x2="48" y2="48">
                <stop offset="0%" stop-color="#667eea"/>
                <stop offset="100%" stop-color="#764ba2"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>Bem-vindo</h1>
        <p>Sistema de Gestão de Fretes</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="tab-buttons">
          <button type="button" class="tab-btn active" data-tab="login">Login</button>
          <button type="button" class="tab-btn" data-tab="register">Cadastro</button>
        </div>
        <div id="tab-login" class="tab-content active">
          <div class="input-group">
            <label for="loginEmail">E-mail</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com" required autocomplete="email">
          </div>
          <div class="input-group">
            <label for="loginPassword">Senha</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <div class="form-footer">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe">
              <span>Lembrar-me</span>
            </label>
            <a href="#" id="forgotPasswordLink">Esqueceu a senha?</a>
          </div>
          <button type="submit" class="btn-primary btn-block" id="loginBtn">
            <span>Entrar</span>
          </button>
          <div class="divider"><span>ou</span></div>
          <button type="button" class="btn-google" id="googleLoginBtn">
            <svg width="18" height="18" viewBox="0 0 18 18">
              <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
              <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
              <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
              <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
            </svg>
            Continuar com Google
          </button>
        </div>
        <div id="tab-register" class="tab-content">
          <div class="input-group">
            <label for="registerName">Nome completo</label>
            <input type="text" id="registerName" placeholder="Seu nome" required autocomplete="name">
          </div>
          <div class="input-group">
            <label for="registerEmail">E-mail</label>
            <input type="email" id="registerEmail" placeholder="seu@email.com" required autocomplete="email">
          </div>
          <div class="input-group">
            <label for="registerPassword">Senha</label>
            <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
            <small class="password-hint">Use pelo menos 6 caracteres</small>
          </div>
          <div class="input-group">
            <label for="registerPasswordConfirm">Confirmar senha</label>
            <input type="password" id="registerPasswordConfirm" placeholder="Digite a senha novamente" required autocomplete="new-password">
          </div>
          <button type="button" class="btn-primary btn-block" id="registerBtn">
            <span>Cadastrar</span>
          </button>
        </div>
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>
      </form>
    </div>
  </div>
  <script>
    const SUPABASE_URL = 'https://mytiqqfsmglzmqxfnerc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dGlxcWZzbWdsem1xeGZuZXJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTA4MDksImV4cCI6MjA5MDIyNjgwOX0.RYZI6J3KcyAPsfFzczsbpod-mWvslJIXLIKVUAl4TII';
    const { createClient } = supabase;
    const authClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, detectSessionInUrl: false, redirectTo: window.location.origin + '/callback.html' }
    });
    const tabButtons = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const targetTab = btn.dataset.tab;
        tabButtons.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${targetTab}`).classList.add('active');
        hideMessages();
      });
    });
    function showError(msg) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      document.getElementById('successMessage').style.display = 'none';
    }
    function showSuccess(msg) {
      const successEl = document.getElementById('successMessage');
      successEl.textContent = msg;
      successEl.style.display = 'block';
      document.getElementById('errorMessage').style.display = 'none';
    }
    function hideMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      if (!email || !password) { showError('Preencha e-mail e senha'); return; }
      btn.disabled = true;
      btn.innerHTML = '<span>Entrando...</span>';
      try {
        const { data, error } = await authClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        showSuccess('Login realizado! Redirecionando...');
        setTimeout(() => { window.location.href = '/app.html'; }, 1000);
      } catch (error) {
        console.error('Erro no login:', error);
        showError(error.message || 'Erro ao fazer login. Verifique suas credenciais.');
        btn.disabled = false;
        btn.innerHTML = '<span>Entrar</span>';
      }
    });
    document.getElementById('registerBtn').addEventListener('click', async () => {
      hideMessages();
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
      const btn = document.getElementById('registerBtn');
      if (!name || !email || !password || !passwordConfirm) { showError('Preencha todos os campos'); return; }
      if (password.length < 6) { showError('A senha deve ter pelo menos 6 caracteres'); return; }
      if (password !== passwordConfirm) { showError('As senhas não coincidem'); return; }
      btn.disabled = true;
      btn.innerHTML = '<span>Cadastrando...</span>';
      try {
        const { data, error } = await authClient.auth.signUp({
          email, password,
          options: { data: { name: name }, emailRedirectTo: window.location.origin + '/callback.html' }
        });
        if (error) throw error;
        showSuccess('Cadastro realizado! Verificando...');
        setTimeout(() => { window.location.href = '/app.html'; }, 2000);
      } catch (error) {
        console.error('Erro no cadastro:', error);
        showError(error.message || 'Erro ao criar conta. Tente novamente.');
        btn.disabled = false;
        btn.innerHTML = '<span>Cadastrar</span>';
      }
    });
    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
      hideMessages();
      try {
        const { data, error } = await authClient.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + '/callback.html' }
        });
        if (error) throw error;
      } catch (error) {
        console.error('Erro no Google OAuth:', error);
        showError('Erro ao conectar com Google');
      }
    });
    document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
      e.preventDefault();
      hideMessages();
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) { showError('Digite seu e-mail no campo acima primeiro'); return; }
      try {
        const { error } = await authClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/pages/reset-password.html'
        });
        if (error) throw error;
        showSuccess('E-mail de recuperação enviado! Verifique sua caixa de entrada.');
      } catch (error) {
        console.error('Erro ao enviar e-mail:', error);
        showError('Erro ao enviar e-mail de recuperação');
      }
    });
    (async () => {
      const { data: { session } } = await authClient.auth.getSession();
      if (session) { window.location.href = '/app.html'; }
    })();
  </script>
</body>
</html>
