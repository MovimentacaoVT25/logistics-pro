<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redefinir Senha | Logistics Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans','sans-serif'] } } } }</script>
</head>
<body class="font-sans antialiased">
  <div id="toastContainer" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>
  <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[9998] hidden items-center justify-center">
    <div class="flex flex-col items-center gap-4">
      <div class="w-12 h-12 border-4 border-primary-200 border-t-primary-600 rounded-full animate-spin"></div>
      <p class="text-sm font-medium text-slate-400 animate-pulse">Salvando...</p>
    </div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>

      <h1 class="text-2xl font-bold text-white text-center mb-2">Nova Senha</h1>
      <p class="text-slate-400 text-center text-sm mb-8">Digite sua nova senha abaixo.</p>

      <div id="errorMessage" class="error-message hidden mb-6"></div>

      <form id="resetForm" class="space-y-5">
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="password" id="novaSenha" required minlength="6"
            placeholder="Nova senha (mínimo 6 caracteres)"
            class="login-input"/>
        </div>
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <input type="password" id="confirmarSenha" required minlength="6"
            placeholder="Confirmar nova senha"
            class="login-input"/>
        </div>
        <button type="submit" class="login-btn">Salvar nova senha</button>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nova      = document.getElementById('novaSenha').value;
      const confirmar = document.getElementById('confirmarSenha').value;

      if (nova !== confirmar) {
        showToast('As senhas não coincidem.', 'error');
        return;
      }

      showLoading(true);
      const { error } = await supabase.auth.updateUser({ password: nova });
      showLoading(false);

      if (error) {
        showToast('Erro ao atualizar senha: ' + error.message, 'error');
        return;
      }

      showToast('Senha atualizada com sucesso!', 'success');
      setTimeout(() => window.location.href = '/app.html', 1500);
    });

    function showLoading(v) {
      const o = document.getElementById('loadingOverlay');
      o.classList.toggle('hidden', !v);
      o.classList.toggle('flex', v);
    }
  </script>
</body>
</html>
